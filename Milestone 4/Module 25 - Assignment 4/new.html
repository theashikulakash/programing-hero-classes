<!DOCTYPE html>
<html lang="en" data-theme="soft">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>


    <title>Job Application</title>
</head>

<body>

    <div class="p-6 max-w-7xl mx-auto">
        <div class="flex flex-row md: flex-row justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Available Jobs</h1>

            <div id="stats-container" class="stats shadow mt-4 md:mt-0 gap-10 justify-between">
                <div class="stat px-4 py-2 bg-primary text-primary-content">
                    <div class="stat-title text-white">Total</div>
                    <div id="main-count" class="stat-value">8</div>
                </div>
                <div class="stat px-4 py-2 bg-primary text-primary-content">
                    <div class="stat-title text-white">Interview</div>
                    <div id="main-count" class="stat-value">0</div>
                </div>
                <div class="stat px-4 py-2 bg-primary text-primary-content">
                    <div class="stat-title text-white">Rejected</div>
                    <div id="main-count" class="stat-value">0</div>
                </div>
            </div>
        </div>

        <div role="tablist" class="tabs tabs-lifted mb-6 gap-5">
            <a role="tab" class="btn tab tab-active" onclick="switchTab('all')">All</a>
            <a role="tab" class="btn tab" onclick="switchTab('interview')">Interview</a>
            <a role="tab" class="btn tab" onclick="switchTab('rejected')">Rejected</a>
        </div>

        <div id="job-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </div>


    <script src="./scripts/script.js"></script>
</body>

</html>
