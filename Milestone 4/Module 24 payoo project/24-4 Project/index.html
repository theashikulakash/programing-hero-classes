<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />


    <title>Login</title>

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 m+x-auto">
    <div class="logo w-[200px] mx-auto pt-32">
        <img src="./payoo-resources/assets/Logo-full.png" alt="">
    </div>
    <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-bold">Mobile Unber</label>
                    <input id="input-num" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-100 text-neutral " placeholder="Enter your 11 digit number" />
                    <label class="label font-bold">4 Digit Pin</label>
                    <input id="input-pin" minlength="4" maxlength="4" type="password"
                        class="input rounded-full bg-base-100 text-neutral" placeholder="Enter 4 Digit Pin" />
                    <div><a class="link link-hover">Forgot password?</a></div>
                    <button id="login-btn" class="btn btn-neutral mt-4 rounded-full bg-primary border-none">Login</button>
                </fieldset>
            </div>
        </div>

    <script src="./scripts/script.js"></script>
</body>

</html>
