<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <title>Home</title>


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 m+x-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="./payoo-resources/assets/logo.png" alt="">
                </div>
                <div class="balance-info ">
                    <h2 class="text-2xl font-bold">$ <span id="balance">45000</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right">
                <a href="./index.html"
                    class="btn btn-soft rounded-full hover:bg-blue-500 hover:scale-103 transition-all duration-300"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
            </div>
        </section>
    </header>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50 ">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>

        <div class="buttons grid grid-cols-3 gap-3">
            <button
                class="btn flex-col h-full py-4 btn-soft hover:bg-blue-500 hover:scale-103 transition-all duration-300">
                <img src="./payoo-resources/assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button
                class="btn flex-col h-full py-4 btn-soft hover:bg-blue-500 hover:scale-103 transition-all duration-300">
                <img src="./payoo-resources/assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button
                class="btn flex-col h-full py-4 btn-soft hover:bg-blue-500 hover:scale-103 transition-all duration-300">
                <img src="./payoo-resources/assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button
                class="btn flex-col h-full py-4 btn-soft hover:bg-blue-500 hover:scale-103 transition-all duration-300">
                <img src="./payoo-resources/assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button
                class="btn flex-col h-full py-4 btn-soft hover:bg-blue-500 hover:scale-103 transition-all duration-300">
                <img src="./payoo-resources/assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button
                class="btn flex-col h-full py-4 btn-soft hover:bg-blue-500 hover:scale-103 transition-all duration-300">
                <img src="./payoo-resources/assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <section id="cashout " class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold ">Cashout</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full  shadow-2xl mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label font-bold text-neutral">Agent Number</label>
                        <input id="cashout-number" maxlength="11" minlength="11" type="text"
                            class="input rounded-full bg-base-100 text-neutral w-full"
                            placeholder="Enter 11 digit number" />
                        <label class="label font-bold text-neutral">Amount</label>
                        <input id="cashout-amount" maxlength="11" minlength="11" type="number"
                            class="input rounded-full bg-base-100 text-neutral  w-full"
                            placeholder="Enter amount to withdraw" />
                        <label class="label font-bold text-neutral">4 Digit Pin</label>
                        <input id="cashout-pin" minlength="4" maxlength="4" type="password"
                            class="input rounded-full bg-base-100 text-neutral w-full"
                            placeholder="Enter 4 Digit Pin" />
                        <button id="cashout-btn"
                            class="btn btn-neutral mt-4 rounded-full bg-primary border-none text-xl">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
    </section>

    <section id="add-money " class="w-11/12 mx-auto py-5">
        <h2 class="text-xl font-bold ">Add Money</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full  shadow-2xl mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <select class="select rounded-full w-full">
                            <option disabled selected>Select Bank</option>
                            <option>DBBL</option>
                            <option>IBBL</option>
                            <option>BRAC</option>
                            <option>SONALI PLC</option>
                            <option>RUPALI PLC</option>
                            <option>JANATA PLC</option>
                        </select>

                        <label class="label font-bold text-neutral">Account Number</label>
                        <input id="account-number" maxlength="11" minlength="11" type="text"
                            class="input rounded-full bg-base-100 text-neutral w-full"
                            placeholder="Enter 13 digit account number" />

                        <label class="label font-bold text-neutral">Amount</label>
                        <input id="add-amount" maxlength="11" minlength="11" type="number"
                            class="input rounded-full bg-base-100 text-neutral  w-full"
                            placeholder="Enter amount to add" />

                        <label class="label font-bold text-neutral">4 Digit Pin</label>
                        <input id="add-pin" minlength="4" maxlength="4" type="password"
                            class="input rounded-full bg-base-100 text-neutral w-full"
                            placeholder="Enter 4 Digit Pin" />

                        <button id="cashout-btn"
                            class="btn btn-neutral mt-4 rounded-full bg-primary border-none text-xl">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
    </section>


    <script src="./scripts/machine.js"></script>
    <script src="./scripts/cashout.js"></script>
</body>

</html>
