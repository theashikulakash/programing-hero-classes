<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        nav {
            display: flex;
            justify-content: space-around;
            width: 100vw;
            /* border: 2px black solid; */
        }

        nav a {
            text-decoration: none;
            color: seagreen;
            margin-left: 30px;
            font-size: 24px;

        }

        .login-form {
            display: flex;
            flex-direction: column;
            width: 50%;
            justify-content: center;
            align-items: center;
            /* border: 2px black solid; */
        }

        .login-form h3 {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            color: seagreen;
        }

        .login-form input {
            margin-top: 20px;
        }
        .form-container {
            display: flex;
            justify-content: center;
            width: 100vw;
            height: 80vh;
            /* border: 2px black solid; */
        }
        .form-container .login-form input:nth-child(2) {
            width: 280px;
            color: black;
            /* border: none; */
        }
        .form-container .login-form input:nth-child(3) {
            width: 280px;
            color: black;
            /* border: none; */
        }
        .form-container .login-form input:nth-child(4) {
            width: 100px;
            height: 30px;
            color: white;
            border: none;
            background-color: seagreen;
            border-radius: 6px;
            font-weight: bolder;
            cursor: pointer;
        }
        .form-container .login-form input:nth-child(4):hover {
            background-color: transparent;
            color: black;
            border: 1px solid seagreen;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-left">
            <a href="">Home</a>
            <a href="">Profile</a>
            <a href="">Blog</a>
            <a href="">About</a>
        </div>
        <a href="">Login</a>
    </nav>
    <section class="form-container">
        <form class="login-form">
            <h3>Please LogIn</h3>
            <input type="email" name="" id="" placeholder="Your Email...">
            <input type="password" name="" id="" placeholder="Your Password...">
            <input type="submit" value="LogIn">
        </form>
    </section>
</body>

</html>
