<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recap Grid span</title>
    <style>
        .container {
            display: grid;
            gap: 5px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 200px 200px 200px 50px 50px;
        }
        .box {
            background-color: blueviolet;
            padding: 10px;
            border-radius: 6px;
        }
        #sidebar {
            grid-column: span 1;
            grid-row: span 5;
        }
        #footer {
            grid-column: span 3;
        }

    </style>
</head>
<body>
    <div class="container">
        <div id="sidebar" class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
        <div class="box">box4</div>
        <div class="box">box5</div>
        <div class="box">box6</div>
        <div class="box">box7</div>
        <div class="box">box8</div>
        <div class="box">box9</div>
        <div class="box">box10</div>
        <div id="footer" class="box">box11</div>
        <div id="footer" class="box">box12</div>
    </div>
</body>
</html>
