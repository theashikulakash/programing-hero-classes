        /* grid styles */
        
        .container {
            gap: 3px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 100px);
        }
        .container img {
            width: 100%;
            height: 100%;
        }
        .banner {
            grid-column: span 6;
            grid-row: span 2;
        }
        .normal {
            grid-column: span 2;
            grid-row: span 2;
        }
        .wide {
            grid-column: span 2;
            grid-row: span 1;
        }
        .small {
            grid-column: span 1;
            grid-row: span 1;
        }
        
        @media screen and (max-width:576) {
            
        }

    </style>
</head>
