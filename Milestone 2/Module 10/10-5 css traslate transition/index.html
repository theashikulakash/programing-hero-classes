<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trasition</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            background-color: yellowgreen;
            /* property name duration easing function delay */
            transition: width 5s linear 2s;
        }
        .box:hover {
            width: 40px;
            margin-left: 55px;
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <ul>
        <li>Transform: change the shape</li>
        <li>Translate: it is a value of the Transform style rule. X axis or Y axis wise moveing value.</li>
        <li>Transition: How long it will take to do the change of the shape or color</li>
    </ul>
    <div class="box">box1</div>
    <div class="box">box2</div>
    <div class="box">box3</div>
</body>
</html>
