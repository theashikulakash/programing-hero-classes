<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitha Ghor</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header>

    </header>
    <main>
        <section>
            <h2>Jamal er Pitha Ghor</h2>
            <form>
                <fieldset class="basic-info">
                    <legend>Personal Info</legend>
                    <label for="name">Name:</label>
                    <input type="text" name="" id="name">
                    <label for="email">Email:</label>
                    <input type="email" name="" id="email">
                    <label for="address">Address:</label>
                    <input type="text" id="address" name="">
                </fieldset>
                <fieldset>
                    <legend>Pitha Selection</legend>
                    <label for="Chitoy">Chitoy</label>
                    <input type="radio" name="pitha" id="Chitoy">
                    <label for="Puli">Puli</label>
                    <input type="radio" name="pitha" id="Puli">
                </fieldset>
                <fieldset>
                    <legend>Vorta Selection</legend>
                    <label for="Shorisha">Shorisha</label>
                    <input type="checkbox" name="vorta" id="Shorisha">
                    <label for="Morich">Morich</label>
                    <input type="checkbox" name="vorta" id="Morich">
                    <label for="Shutki">Shutki</label>
                    <input type="checkbox" name="vorta" id="Shutki">
                </fieldset>
                <fieldset>
                    <legend>Extra Requirments</legend>
                    <textarea cols="50" rows="5"></textarea>
                </fieldset>
                <input type="submit" value="submit">
                <input type="reset" value="Clear">
            </form>
        </section>
    </main>
</body>

</html>
