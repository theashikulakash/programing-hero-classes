<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in html</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <table>
                <caption>DIU Friends info</caption>
                <thead>
                    <tr>
                        <td>ID</td>
                        <td>Name</td>
                        <td>Age</td>
                    </tr>
                </thead>
                <tbody>
                    <tr>

                    </tr>
                    <tr>
                        <td>1</td>
                        <td>Meash</td>
                        <td>29</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Mozammel</td>
                        <td>29</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Tanbir</td>
                        <td>28</td>
                    </tr>
                </tbody>
                <tfoot>
                    <td colspan="2">Total Friends 3</td>
                </tfoot>
            </table>
        </section>
        <section>
            <h2>Table info and tags</h2>
            <ul>
                <li>Table: Table</li>
                <li>thead: Header of the table</li>
                <li>tbody: Body of the table</li>
                <li>tfoot: Footer of the table</li>
            </ul>
        </section>
    </main>
</body>

</html>
